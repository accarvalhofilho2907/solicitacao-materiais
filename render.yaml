services:
  - type: web
    name: solicitacao-materiais
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt psycopg2-binary==2.9.10
    startCommand: gunicorn wsgi:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # cole a string do Neon no painel do Render
      - key: BASE_URL
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
