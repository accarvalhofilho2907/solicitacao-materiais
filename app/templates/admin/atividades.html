{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('admin.cadastros') }}" class="small">&larr; Cadastros</a>
<h4 class="mt-2 mb-3">Atividades</h4>
<div class="row g-3">
  <div class="col-md-4"><div class="card"><div class="card-body">
    <form method="post" class="d-flex gap-2"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input name="nome" class="form-control" placeholder="Nova atividade" required><button class="btn btn-primary">+</button></form>
  </div></div></div>
  <div class="col-md-8"><div class="card"><div class="table-responsive"><table class="table mb-0 align-middle">
    <thead class="table-light"><tr><th>Atividade</th><th>Situação</th><th></th></tr></thead>
    <tbody>{% for a in lista %}
      <tr><td>{{ a.nome }}</td><td>{% if a.ativo %}<span class="badge bg-success">ativa</span>{% else %}<span class="badge bg-secondary">inativa</span>{% endif %}</td>
        <td><button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#a{{ a.id }}">Editar</button></td></tr>
      <tr class="collapse" id="a{{ a.id }}"><td colspan="3"><form method="post" action="{{ url_for('admin.atividade_editar', aid=a.id) }}" class="row g-2">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="col-md-7"><input name="nome" class="form-control form-control-sm" value="{{ a.nome }}"></div>
        <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="ativo" value="1" {{ 'checked' if a.ativo }}><label class="form-check-label small">Ativa</label></div></div>
        <div class="col-md-2 text-end"><button class="btn btn-sm btn-primary">Salvar</button></div></form></td></tr>
    {% else %}<tr><td colspan="3" class="text-muted">Nenhuma atividade.</td></tr>{% endfor %}</tbody>
  </table></div></div></div>
</div>
{% endblock %}
