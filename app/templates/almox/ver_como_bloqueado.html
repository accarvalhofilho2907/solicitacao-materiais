{% extends "base.html" %}
{% block title %}Sem acesso — visão de perfil{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="display-6 mb-2">🔒</div>
  <h4>Esta tela não faz parte do perfil <b>{{ perfil }}</b></h4>
  <p class="text-muted">Você está vendo o sistema como esse perfil veria. Ele não tem acesso a esta tela.</p>
  <a href="{{ url_for('almox.ver_como_sair') }}" class="btn btn-primary mt-2">← Voltar à minha visão</a>
</div>
{% endblock %}
