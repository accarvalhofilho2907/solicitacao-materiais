<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><title>QR das chaves — A4 dobrável</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;margin:8mm}
  .noprint{margin-bottom:12px;font-size:13px}
  @media print{.noprint{display:none} body{margin:0} @page{margin:8mm}}
  .grid{display:flex;flex-wrap:wrap;gap:3mm}
  .label{width:44mm;height:44mm;border:0.2mm solid #000;border-radius:1mm;display:flex;flex-direction:column;
    box-sizing:border-box;page-break-inside:avoid;overflow:hidden;background:#fff;color:#000}
  .half{height:22mm;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:2mm;padding:1.5mm}
  .half.bottom{transform:rotate(180deg);border-top:0.2mm dashed #888}
  .half .qr img{width:17mm;height:17mm;display:block;image-rendering:pixelated}
  .half .txt{font-size:7.5pt;font-weight:700;line-height:1.12;max-width:22mm;overflow:hidden}
  .half .txt small{display:block;font-weight:400;font-size:5.5pt;color:#333}
  .carregando{color:#888;font-size:12px;margin:8px 0}
</style></head><body>
<div class="noprint">
  <button onclick="window.print()">🖨️ Imprimir</button>
  <span style="color:#555"> — {{ itens|length }} chave(s). Etiqueta 44×44mm: dobre na linha do meio; os dois lados ficam legíveis no chaveiro.</span>
  <div class="carregando" id="carregando">Gerando QR codes…</div>
</div>

<div class="grid">
  {% for c in itens %}
  <div class="label">
    <div class="half top">
      <div class="qr" data-code="CHAVE:{{ c.qr_uid or c.id }}"></div>
      <div class="txt">{{ c.descricao }}<small>{{ c.quadro_nome or '' }}</small></div>
    </div>
    <div class="half bottom">
      <div class="qr" data-code="CHAVE:{{ c.qr_uid or c.id }}"></div>
      <div class="txt">{{ c.descricao }}<small>{{ c.quadro_nome or '' }}</small></div>
    </div>
  </div>
  {% else %}<p>Nenhuma chave para imprimir.</p>{% endfor %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script>
  (function(){
    var boxes=document.querySelectorAll('.qr[data-code]'); var i=0;
    function lote(){
      var fim=Math.min(i+60, boxes.length);
      for(; i<fim; i++){
        try{ var q=qrcode(0,'M'); q.addData(boxes[i].getAttribute('data-code')); q.make();
             boxes[i].innerHTML=q.createImgTag(4,0); }
        catch(e){ boxes[i].textContent='QR?'; }
      }
      if(i<boxes.length){ setTimeout(lote,0); }
      else{ var el=document.getElementById('carregando'); if(el) el.style.display='none'; }
    }
    if(window.qrcode){ lote(); } else { var el=document.getElementById('carregando'); if(el) el.textContent='Falha ao carregar gerador de QR (verifique a internet).'; }
  })();
</script>
</body></html>
