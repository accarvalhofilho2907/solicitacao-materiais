{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('admin.fornecedores') }}" class="small">&larr; Voltar</a>
<h4 class="mt-2 mb-3">Editar fornecedor</h4>
<div class="card" style="max-width:560px"><div class="card-body">
  <form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-2"><label class="form-label">Razão Social</label><input name="razao_social" class="form-control" value="{{ f.razao_social or '' }}"></div>
    <div class="mb-2"><label class="form-label">Nome Fantasia</label><input name="nome_fantasia" class="form-control" value="{{ f.nome_fantasia or '' }}"></div>
    <div class="mb-2"><label class="form-label">E-mail</label><input name="email" type="email" class="form-control" value="{{ f.email }}" required></div>
    <div class="mb-2"><label class="form-label">Nome do contato</label><input name="contato_nome" class="form-control" value="{{ f.contato_nome or '' }}"></div>
    <div class="mb-2"><label class="form-label">Telefone / WhatsApp</label><input name="telefone" class="form-control" value="{{ f.telefone or '' }}">
      {% if f.telefone_e164 %}<div class="form-text">WhatsApp: {{ f.telefone_e164 }}</div>{% endif %}</div>
    <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" name="ativo" value="1" id="ativo" {{ 'checked' if f.ativo }}><label class="form-check-label" for="ativo">Ativo</label></div>
    <label class="form-label">Tipos de material atendidos</label>
    <input class="form-control form-control-sm mb-1" placeholder="Buscar tipo..." onkeyup="filtrarChk(this.value,'boxTipos')">
    <div class="border rounded p-2 mb-3" id="boxTipos" style="max-height:200px;overflow:auto">
      {% for t in tipos %}<div class="form-check chk" data-nome="{{ t.nome|lower }}"><input class="form-check-input" type="checkbox" name="tipos" value="{{ t.id }}" id="e{{ t.id }}" {{ 'checked' if t.id in tipos_ids }}><label class="form-check-label" for="e{{ t.id }}">{{ t.nome }}</label></div>{% endfor %}
    </div>
    <button class="btn btn-primary">Salvar</button> <a class="btn btn-link" href="{{ url_for('admin.fornecedores') }}">Cancelar</a>
  </form>
</div></div>
<script>
function filtrarChk(q, boxId){ q=q.toLowerCase(); document.querySelectorAll('#'+boxId+' .chk').forEach(function(d){ d.style.display = d.dataset.nome.indexOf(q)>=0?'':'none'; }); }
</script>
{% endblock %}
