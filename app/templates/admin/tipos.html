{% extends "base.html" %}
{% block content %}
<a href="{{ url_for('admin.cadastros') }}" class="small">&larr; Cadastros</a>
<h4 class="mt-2 mb-3">Tipos de material</h4>
<div class="row g-3">
  <div class="col-md-4"><div class="card"><div class="card-body">
    <form method="post" class="d-flex gap-2"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input name="nome" class="form-control" placeholder="Novo tipo" required><button class="btn btn-primary">+</button></form>
    <form method="post" action="{{ url_for('admin.tipos_ativar_todos') }}" class="mt-2"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-outline-success w-100">Ativar todos os tipos</button></form>
  </div></div></div>
  <div class="col-md-8"><div class="card"><div class="card-body">
    <input class="form-control form-control-sm mb-2" placeholder="Buscar tipo..." onkeyup="filtrarTipos(this.value)">
    <div class="table-responsive" style="max-height:460px;overflow:auto"><table class="table mb-0 align-middle">
      <tbody id="tabTipos">{% for t in lista %}
        <tr class="lt" data-nome="{{ t.nome|lower }}"><td>{{ t.nome }}{% if not t.ativo %} <span class="badge bg-secondary">inativo</span>{% endif %}<span class="badge bg-secondary float-end">{{ t.fornecedores|length }} forn.</span></td>
          <td style="width:90px"><button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#tp{{ t.id }}">Editar</button></td></tr>
        <tr class="collapse" id="tp{{ t.id }}"><td colspan="2"><form method="post" action="{{ url_for('admin.tipo_editar', tid=t.id) }}" class="row g-2">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="col-md-7"><input name="nome" class="form-control form-control-sm" value="{{ t.nome }}"></div>
          <div class="col-md-3"><div class="form-check"><input class="form-check-input" type="checkbox" name="ativo" value="1" {{ 'checked' if t.ativo }}><label class="form-check-label small">Ativo</label></div></div>
          <div class="col-md-2 text-end"><button class="btn btn-sm btn-primary">Salvar</button></div></form></td></tr>
      {% endfor %}</tbody>
    </table></div>
  </div></div></div>
</div>
<script>
function filtrarTipos(q){ q=q.toLowerCase(); document.querySelectorAll('#tabTipos tr.lt').forEach(function(r){ r.style.display = r.dataset.nome.indexOf(q)>=0?'':'none'; }); }
</script>
{% endblock %}
